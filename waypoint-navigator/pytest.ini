[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# Configuracion de pytest para waypoint-navigator
#
# Gates separados (ejecutar explicitamente):
#   smoke    → comportamiento puro, sin coverage (default):
#              python -m pytest
#   coverage → ver numeros sin bloquear:
#              python -m pytest --cov=src --cov-report=term-missing
#   release  → gate estricto (≥70%):
#              python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=70
#
# Coverage NO esta en addopts para que smoke y coverage sean modos ortogonales.
# ─────────────────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Marcadores personalizados
markers =
    slow: tests que tardan mas de 1 s (carga de mapa, descarga)
    obs:  tests que requieren OBS en ejecucion
    smoke: subset rapido de comportamiento critico sin coverage gate
