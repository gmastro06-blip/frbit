[mypy]
python_version = 3.12
mypy_path = $MYPY_CONFIG_FILE_DIR/waypoint-navigator
namespace_packages = True
explicit_package_bases = True
check_untyped_defs = True
disallow_untyped_defs = True
ignore_missing_imports = True
exclude = (?x)(output/|tests/|tools/|examples/|arduino/|pico2/|analyze_tests\.py|\.kiro/)

[mypy-output.*]
ignore_errors = True

[mypy-tests.*]
disallow_untyped_defs = False